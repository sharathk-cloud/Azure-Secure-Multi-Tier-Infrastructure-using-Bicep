

name: Bicep CI - Lint, Validate and What-If

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
 

  lint:
    name: Lint Bicep Code
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Cache Bicep CLI
        uses: actions/cache@v4
        with:
          path: ~/.azure/bicep
          key: ${{ runner.os }}-bicep-${{ hashFiles('**/*.bicep') }}
          restore-keys: |
            ${{ runner.os }}-bicep-

      - name: Install Azure CLI + Bicep
        run: |
          az version || curl -sL https://aka.ms/InstallAzureCLIDeb | sudo bash
          az bicep install
          az bicep version

      - name: Lint — build all Bicep files
        run: |
          echo "Linting all Bicep files..."
          find . -name "*.bicep" | while read file; do
            echo "Checking: $file"
            bicep build "$file" --outfile /dev/null
          done
          echo "All files passed lint."

  validate:
    name: Validate Against Azure
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Cache Bicep CLI
        uses: actions/cache@v4
        with:
          path: ~/.azure/bicep
          key: ${{ runner.os }}-bicep-${{ hashFiles('**/*.bicep') }}
          restore-keys: |
            ${{ runner.os }}-bicep-

      - name: Install Azure CLI + Bicep
        run: |
          az version || curl -sL https://aka.ms/InstallAzureCLIDeb | sudo bash
          az bicep install

      - name: Login to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Validate deployment
        run: |
          az deployment group validate \
            --resource-group ${{ secrets.AZURE_RG }} \
            --template-file bicep/main.bicep \
            --parameters bicep/params/dev.parameters.json

  what-if:
    name: What-If Preview
    runs-on: ubuntu-latest
    needs: validate

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Cache Bicep CLI
        uses: actions/cache@v4
        with:
          path: ~/.azure/bicep
          key: ${{ runner.os }}-bicep-${{ hashFiles('**/*.bicep') }}
          restore-keys: |
            ${{ runner.os }}-bicep-

      - name: Install Azure CLI + Bicep
        run: |
          az version || curl -sL https://aka.ms/InstallAzureCLIDeb | sudo bash
          az bicep install

      - name: Login to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Run What-If
        run: |
          az deployment group what-if \
            --resource-group ${{ secrets.AZURE_RG }} \
            --template-file bicep/main.bicep \
            --parameters bicep/params/dev.parameters.json


